name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: "1.97.1"

jobs:
  check:
    name: Check, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustup component add rustfmt clippy

      - name: Install tmux for integration tests
        run: |
          sudo apt-get update
          sudo apt-get install --yes tmux

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

  build:
    name: Compile ${{ matrix.label }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            executable: muxloom
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            executable: muxloom
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            executable: muxloom
          - label: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: muxloom.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustup target add "${{ matrix.target }}"

      - name: Install musl linker
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage raw binaries
        shell: bash
        run: |
          raw="raw/${{ matrix.target }}"
          mkdir -p "$raw"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "$raw/"
          if [[ "${{ matrix.target }}" != *windows* ]]; then
            cp "target/${{ matrix.target }}/release/muxloomd" "$raw/"
          fi

      - name: Upload raw binaries
        uses: actions/upload-artifact@v7
        with:
          name: raw-${{ matrix.target }}
          path: raw
          if-no-files-found: error
          compression-level: 0

  package:
    name: Assemble controller and companion bundles
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download raw binaries
        uses: actions/download-artifact@v8
        with:
          pattern: raw-*
          path: raw
          merge-multiple: true

      - name: Assemble all platform archives
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME//\//-}"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$ref_name"
          else
            version="${ref_name}-${GITHUB_SHA:0:7}"
          fi
          mkdir -p dist
          package_target() {
            target="$1"
            executable="$2"
            archive="$3"
            package="muxloom-${version}-${target}"
            root="dist/$package"
            mkdir -p "$root"
            cp "raw/$target/$executable" "$root/"
            if [[ -f "raw/$target/muxloomd" ]]; then
              cp "raw/$target/muxloomd" "$root/"
            fi
            for companion_target in \
              x86_64-unknown-linux-musl \
              aarch64-apple-darwin \
              x86_64-apple-darwin; do
              mkdir -p "$root/companions/$companion_target"
              cp "raw/$companion_target/muxloomd" \
                "$root/companions/$companion_target/muxloomd"
            done
            cp README.md LICENSE "$root/"
            if [[ "$archive" == "zip" ]]; then
              (cd dist && zip -qr "$package.zip" "$package")
              (cd dist && sha256sum "$package.zip" > "$package.zip.sha256")
            else
              tar -C dist -czf "dist/$package.tar.gz" "$package"
              (cd dist && sha256sum "$package.tar.gz" > "$package.tar.gz.sha256")
            fi
          }
          package_target x86_64-unknown-linux-musl muxloom tar.gz
          package_target aarch64-apple-darwin muxloom tar.gz
          package_target x86_64-apple-darwin muxloom tar.gz
          package_target x86_64-pc-windows-msvc muxloom.exe zip
          for companion_target in \
            x86_64-unknown-linux-musl \
            aarch64-apple-darwin \
            x86_64-apple-darwin; do
            asset="muxloomd-$companion_target"
            cp "raw/$companion_target/muxloomd" "dist/$asset"
            (cd dist && sha256sum "$asset" > "$asset.sha256")
          done

      - name: Upload release packages
        uses: actions/upload-artifact@v7
        with:
          name: muxloom-packages
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/muxloomd-*
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: muxloom-packages
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          release_args=(
            "$GITHUB_REF_NAME"
            dist/*
            --verify-tag
            --generate-notes
            --title "Muxloom $GITHUB_REF_NAME"
          )
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"
