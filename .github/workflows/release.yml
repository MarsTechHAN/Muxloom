name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_VERSION: "1.97.1"

jobs:
  check:
    name: Check, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustup component add rustfmt clippy

      - name: Install tmux for integration tests
        run: |
          sudo apt-get update
          sudo apt-get install --yes tmux

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

  build:
    name: Build ${{ matrix.label }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: muxloom
            archive: tar.gz
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            executable: muxloom
            archive: tar.gz
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            executable: muxloom
            archive: tar.gz
          - label: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: muxloom.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Set package name
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME//\//-}"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$ref_name"
          else
            version="${ref_name}-${GITHUB_SHA:0:7}"
          fi
          echo "PACKAGE_NAME=muxloom-${version}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          package_dir="dist/$PACKAGE_NAME"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          tar -C dist -czf "dist/$PACKAGE_NAME.tar.gz" "$PACKAGE_NAME"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "$PACKAGE_NAME.tar.gz" > "$PACKAGE_NAME.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "$PACKAGE_NAME.tar.gz" > "$PACKAGE_NAME.tar.gz.sha256")
          fi

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $packageDir = Join-Path "dist" $env:PACKAGE_NAME
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.executable }}" $packageDir
          Copy-Item README.md, LICENSE $packageDir
          $archive = "dist/$env:PACKAGE_NAME.zip"
          Compress-Archive -Path $packageDir -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $env:PACKAGE_NAME.zip" | Set-Content -Encoding utf8 "$archive.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: muxloom-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: muxloom-*
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          release_args=(
            "$GITHUB_REF_NAME"
            dist/*
            --verify-tag
            --generate-notes
            --title "Muxloom $GITHUB_REF_NAME"
          )
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"
